name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency health check
        run: |
          pip check

      - name: Syntax check
        run: |
          python -m py_compile app.py ingest_data.py rag_engine.py test_setup.py

      - name: Import smoke check
        run: |
          python -c "import app, ingest_data, rag_engine, test_setup; print('imports ok')"

      - name: Setup smoke check
        run: |
          python test_setup.py
